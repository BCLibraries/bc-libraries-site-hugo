{{ if .Params.Destination }}
    {{ .Scratch.Set "dest" .Params.Destination }}
{{ else }}
    {{ .Scratch.Set "dest" .Permalink }}
{{ end }}

<li class="holder">
    <div class="frame">
        <a href='{{ .Scratch.Get "dest" }}'>
            <img src='{{ .Site.Params.imageBaseURL }}/{{ .Section }}/{{ .Params.location }}/{{ .Params.imagethumb }}' alt="{{ .Params.imagealt }}">
            
            <div class="info">
                <p class="date">{{ .Params.daterange }}</p>
                <p class="title">{{ .Title | safeHTML }}</p>
            </div>
        </a>
    </div>
</li>
