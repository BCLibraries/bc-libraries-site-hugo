{{/* show beta button */}}
<div class="row">
  <div class="col-md-12" id="search-panel" data-tag="ga-tag">
    <div class="row">
      <div class="col-md-12">
        <form id="search-panel__form" action="https://bc.primo.exlibrisgroup.com/nde/search?" role="search">
        <div class="input-group">
          <label for="lib-search-box" class="sr-only">Search BC Libraries</label>
          <input class="form-control" name="query" placeholder="Search for books, articles, journals, databases"
                 id="lib-search-box">
          <input type="hidden" name="tab" value="Everything" />
          <input type="hidden" name="search_scope" value="MyInst_and_CI" />
          <input type="hidden" name="vid" value="01BC_INST:scot_nde" />
          <input type="hidden" name="lang" value="en" />
          <span class="input-group-btn">
                            <button class="btn btn-default" type="submit">
                              <i class="fa fa-search" aria-hidden="true"></i> <span
                              class="search-button-text">Search</span></button>
                        </span>
        </div>
        </form>
      </div>
    </div>
    <div class="row" id="search-links">
      <div class="col-sm-2 col-sm-offset-1">
        <a href="https://bc.primo.exlibrisgroup.com/discovery/search?vid=01BC_INST:bclib&lang=en"
           class="search-link nde-book-search-link">Books</a>
      </div>
      <div class="col-sm-2">
        <a
          href="https://bc.primo.exlibrisgroup.com/nde/search?tab=LibraryCatalog&search_scope=MyInstitution&vid=01BC_INST:scot_nde&lang=en"
          class="search-link  nde-article-search-link">Articles</a>
      </div>
      <div class=" col-sm-2">
        <a href="https://bc.primo.exlibrisgroup.com/nde/jsearch?vid=01BC_INST:scot_nde&lang=en"
           class="search-link nde-journal-search-link">Journals</a>
      </div>
      <div class=" col-sm-3">
        <a href="https://bc.primo.exlibrisgroup.com/nde/home?vid=01BC_INST:scot_nde&lang=en&mode=advanced"
           class="advanced-search-link">Advanced search</a>
      </div>
    </div>
  </div>
</div>
