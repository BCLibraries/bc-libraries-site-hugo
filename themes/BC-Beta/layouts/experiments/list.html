{{ define "title" }}Experiments Archive{{ end }}

{{ define "header" }}{{ end }}

{{ define "pagestyles" }}
    <link rel="stylesheet" type="text/css" href="{{ .Site.BaseURL }}css/news.css"/>
    <link href="https://fonts.googleapis.com/css?family=Kalam:400&display=swap" rel="stylesheet"> 
    <style>
        article {
            margin: 1rem 0 2rem 0;
            height: 180px;
            overflow: hidden;
        }
        article .media-body p {
            line-height: 1.5;
        }
        article img.media-object {
            max-width: 137px;
        }
    </style>
{{ end }}

{{ define "main" }}
<div class="container news-container">
    {{ partial "experiments/breadcrumbs.html" . }}
    <h2 id="main-heading" class="page-title">{{ .Title }} Archive</h2>

    <h3>2019</h3>
    <div class="news_archives row">
    {{ range where .Pages ".Params.year" "2019" }}
    {{ .Render "summary"}}
    {{ end }}
    </div>

</div>
{{end}}
